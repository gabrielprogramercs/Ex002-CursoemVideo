<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
</head>
<body>
    <h1>Parágrafos e quebra de linha </h1>
    <hr>
    <p>Você pode escrever um parágrafo de qualquer jeito. Basta colocar tudo no meio do par de tags &lt;p e &lt;/p&gt; </p>
    <p>Se precisar quebrar o texto em algum lugar <br> específico, basta usar a tag &lt;br&gt; </p> <!--A TAG &lt;br&gt; cria uma quebra de linha e &lt e &gt é uma tag usada para representar os sinais de menor e maior que utilzada para demonstrar o codigo sem escrevelo-->
</body>
</html>
